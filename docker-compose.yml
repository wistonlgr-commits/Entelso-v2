services:
  # ─────────────────────────────────────────────────
  # Backend API (Node.js + Express)
  # Conecta a Supabase via DATABASE_URL en .env
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entelso_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      # En producción → usa .env.production (NODE_ENV=production, CORS correcto, Session Pooler)
      # Para pruebas locales → cambiar a ./backend/.env.development
      - ./backend/.env.production
    networks:
      - entelso_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ─────────────────────────────────────────────────
  # Frontend Dashboard (Servidor Web Nginx Ligero)
  # ─────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: entelso_dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    networks:
      - entelso_network

networks:
  entelso_network:
    name: entelso_network
    driver: bridge
